<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Handwritten to Text | XpenseTrack</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');

        :root {
            --primary: #8e44ad; /* Deep Violet */
            --secondary: #a29bfe; /* Light Violet */
            --accent: #ff7b00; 
            --glass: rgba(255, 255, 255, 0.9);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Poppins", sans-serif;
        }

        body {
            background-image: linear-gradient(rgba(142, 68, 173, 0.2), rgba(142, 68, 173, 0.2)), url('static/receipt.jpg');
            background-position: center;
            background-repeat: no-repeat;
            background-size: cover;
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* --- Header / Navbar --- */
        .header {
            background: var(--glass);
            backdrop-filter: blur(10px);
            padding: 15px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }

        .header .logo {
            font-size: 26px;
            font-weight: 700;
            background: linear-gradient(45deg, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .login-btn {
            background-color: #ff4757; /* Logout Red */
            color: white;
            padding: 8px 20px;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.3s;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 71, 87, 0.3);
        }

        /* --- Main Content --- */
        .container {
            background: var(--glass);
            backdrop-filter: blur(15px);
            padding: 40px;
            border-radius: 30px;
            width: 100%;
            max-width: 500px;
            margin: 80px auto;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        h1 {
            color: var(--primary);
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 20px;
        }

        .upload-form {
            margin-bottom: 25px;
        }

        input[type="file"] {
            width: 100%;
            padding: 12px;
            background: rgba(142, 68, 173, 0.05);
            border: 2px dashed var(--secondary);
            border-radius: 12px;
            cursor: pointer;
            color: #555;
            margin-bottom: 20px;
        }

        button[type="submit"] {
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: 0.3s;
            box-shadow: 0 10px 20px rgba(142, 68, 173, 0.3);
        }

        button[type="submit"]:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 25px rgba(142, 68, 173, 0.4);
        }

        textarea {
            width: 100%;
            height: 200px;
            padding: 15px;
            border-radius: 15px;
            border: 1px solid #ddd;
            background: #f9f9ff;
            font-size: 14px;
            resize: none;
            margin-top: 15px;
            color: #333;
            outline: none;
        }

        img {
            max-width: 100%;
            border-radius: 15px;
            margin-top: 20px;
            border: 4px solid white;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        h3 {
            color: var(--primary);
            font-size: 16px;
            margin-top: 20px;
            font-weight: 600;
        }

        @media (max-width: 768px) {
            .header { padding: 15px 20px; }
            .container { width: 90%; margin-top: 40px; }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo"><i class="fas fa-file-signature"></i> XpenseTrack</div>
        <nav>
            <a href="/dashboard" style="text-decoration: none; color: #4b4b4b; font-size: 14px; font-weight: 500;">
                <i class="fas fa-home"></i> Home
            </a>
        </nav>
        <a href="/dashboard">
            <button class="login-btn">Logout</button>
        </a>
    </div>

    <div class="container">
        <h1><i class="fas fa-camera"></i> Scan Receipt</h1>
        <p style="color: #666; font-size: 14px; margin-bottom: 20px;">Upload an image to convert handwriting to digital text.</p>
        
        <form action="/upload" method="POST" enctype="multipart/form-data" class="upload-form">
            <input type="file" name="image" required>
            <button type="submit">Process & Extract</button>
        </form>

        {% if uploaded_image %}
        <div style="border-top: 1px solid rgba(142, 68, 173, 0.1); padding-top: 20px; margin-top: 20px;">
            <h3><i class="fas fa-image"></i> Preview:</h3>
            <img src="{{ url_for('static', filename='uploads/' + uploaded_image) }}">
        </div>
        {% endif %}

        {% if text %}
        <div style="margin-top: 25px;">
            <h3><i class="fas fa-align-left"></i> Extracted Result:</h3>
            <textarea readonly>{{ text }}</textarea>
        </div>
        {% endif %}
    </div>

    <script>
        // Simple script to show an alert if Tesseract fails (handled by Flask)
        const alert_Message = "{{ alert_message | safe }}";
        if (alert_Message && alert_Message !== "None") {
            alert(alert_Message);
        }
    </script>
</body>
</html>
