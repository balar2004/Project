<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration | XpenseTrack</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');

        :root {
            --primary: #8e44ad; /* Deep Violet */
            --secondary: #a29bfe; /* Light Violet */
            --accent: #ff7b00; 
            --glass: rgba(255, 255, 255, 0.9);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Poppins", sans-serif;
        }

        body {
            background-image: linear-gradient(rgba(142, 68, 173, 0.2), rgba(142, 68, 173, 0.2)), url('static/reg.jpg');
            background-position: center;
            background-repeat: no-repeat;
            background-size: cover;
            background-attachment: fixed;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh; 
            overflow: hidden;
        }

        .container {
            background: var(--glass);
            backdrop-filter: blur(15px);
            padding: 40px;
            border-radius: 30px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
            text-align: center;
        }

        .logo-icon {
            font-size: 40px;
            color: var(--accent);
            margin-bottom: 10px;
        }

        h2 {
            color: var(--primary);
            font-size: 30px;
            font-weight: 700;
            margin-bottom: 5px;
        }

        p.subtitle {
            color: #666;
            font-size: 14px;
            margin-bottom: 25px;
        }

        input[type="text"], 
        input[type="password"] {
            width: 100%;
            padding: 12px 15px;
            margin: 10px 0;
            border: 2px solid rgba(162, 155, 254, 0.3);
            border-radius: 12px;
            background-color: white;
            color: #333;
            font-size: 14px;
            transition: 0.3s;
            outline: none;
        }

        input[type="text"]:focus, 
        input[type="password"]:focus {
            border-color: var(--primary);
            box-shadow: 0 0 10px rgba(142, 68, 173, 0.1);
        }

        input[type="submit"] {
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            color: white;
            padding: 14px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            width: 100%;
            margin-top: 15px;
            transition: 0.3s;
            box-shadow: 0 10px 20px rgba(142, 68, 173, 0.3);
        }

        input[type="submit"]:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 25px rgba(142, 68, 173, 0.4);
        }

        .footer-text {
            font-size: 14px;
            margin-top: 20px;
            color: #444;
        }

        a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
        }

        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo-icon"><i class="fas fa-user-plus"></i></div>
        <h2>Create Account</h2>
        <p class="subtitle">Join XpenseTrack today</p>
        
        <form action="/register" method="post" id="student-reg">
            <input type="text" id="name" name="name" placeholder="Full Name" required>
            <input type="text" id="email" name="email" placeholder="Email Address" required>
            <input type="password" id="password" name="password" placeholder="Create Password" required>
            
            <input type="submit" value="Register">
            
            <p class="footer-text">Already have an account? <a href="{{ url_for('login') }}">Login here</a></p>
        </form>
    </div>

    <script>
        window.onload = function(){
            const alert_Message = "{{ alert_message | safe }}";
            if(alert_Message && alert_Message !== "None" && alert_Message !== ""){
                alert(alert_Message)
            }
        };
    </script>
</body>
</html>
